apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-k8s-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-k8s-app
  template:
    metadata:
      labels:
        app: my-k8s-app
    spec:
      containers:
      - name: my-k8s-app
        image: 423656921501.dkr.ecr.us-east-1.amazonaws.com/hello-world:latest
        ports:
        - containerPort: 3000
        envFrom:
          - configMapRef:
              name: my-k8s-app-config  # référence le configmap
